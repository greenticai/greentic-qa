name: Release Binaries

on:
  workflow_run:
    workflows:
      - Publish
    types:
      - completed

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build_artifacts:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: ${{ matrix.target }}

      - name: Build greentic-qa binary
        run: cargo build --release -p greentic-qa --target ${{ matrix.target }} --locked

      - name: Package archive
        run: |
          set -euo pipefail
          VERSION=$(awk -F'"' '/^version = "/{print $2; exit}' Cargo.toml)
          TARGET="${{ matrix.target }}"
          BIN_NAME="greentic-qa"
          if [[ "$TARGET" == *"windows"* ]]; then
            BIN_NAME="greentic-qa.exe"
          fi

          BIN_PATH="target/$TARGET/release/$BIN_NAME"
          if [[ ! -f "$BIN_PATH" ]]; then
            echo "binary not found: $BIN_PATH"
            exit 1
          fi

          ARCHIVE_NAME="greentic-qa-${VERSION}-${TARGET}.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C "target/$TARGET/release" "$BIN_NAME"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ env.ARCHIVE_NAME }}

  publish_release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    needs: build_artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          VERSION=$(awk -F'"' '/^version = "/{print $2; exit}' Cargo.toml)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: greentic-qa v${{ env.VERSION }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
